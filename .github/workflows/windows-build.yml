name: Build Windows Distribution

on:
  workflow_dispatch:
  push:
    tags:
      - "windows-v*"

jobs:
  build-windows:
    name: Build Windows zip and setup
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Prepare fonts and icons
        shell: cmd
        run: |
          python build_scripts\fetch_fonts.py
          python build_scripts\generate_app_icon.py

      - name: Build executable
        shell: cmd
        run: |
          if exist build rmdir /s /q build
          if exist dist rmdir /s /q dist
          pyinstaller --noconfirm --clean goedusplit.spec

      - name: Pack portable zip
        shell: cmd
        run: build_scripts\pack_windows.bat

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --yes --no-progress

      - name: Pack setup installer
        shell: cmd
        run: build_scripts\pack_windows_installer.bat

      - name: Collect artifacts
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Copy-Item dist\Goedu-Split-*-windows.zip artifacts\
          Copy-Item dist\Goedu-Split-*-windows-setup.exe artifacts\
          Copy-Item distribution\USER_GUIDE.md artifacts\사용_안내.md

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: goedusplit-windows-distribution
          path: artifacts/*
          retention-days: 14
